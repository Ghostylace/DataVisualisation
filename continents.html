<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continent Comparison - HomelessnessData</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">Unemployment<span class="text-primary">Data</span></a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Country Search</a>
                <a class="nav-link active" href="continents.html">Continent Insights</a>
            </div>
        </div>
    </nav>

<div class="container pb-5">
    <div class="row g-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Regional Unemployment Overview (Global Regions)</h5>
                    <div style="height: 250px;"><canvas id="summaryChart"></canvas></div>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body text-center">
                    <h6 class="text-muted text-uppercase small fw-bold mb-3">North America</h6>
                    <div style="height: auto;"><canvas id="chart-NorthAmerica"></canvas></div>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body text-center">
                    <h6 class="text-muted text-uppercase small fw-bold mb-3">Europe</h6>
                    <div style="height: auto;"><canvas id="chart-Europe"></canvas></div>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body text-center">
                    <h6 class="text-muted text-uppercase small fw-bold mb-3">Asia & Pacific</h6>
                    <div style="height: auto;"><canvas id="chart-Asia"></canvas></div>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body text-center">
                    <h6 class="text-muted text-uppercase small fw-bold mb-3">South America</h6>
                    <div style="height: auto;"><canvas id="chart-SouthAmerica"></canvas></div>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body text-center">
                    <h6 class="text-muted text-uppercase small fw-bold mb-3">Africa</h6>
                    <div style="height: auto;"><canvas id="chart-Africa"></canvas></div>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="continents.js"></script>
</body>
</html>
